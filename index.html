<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115年企業進出口數據看板達成率追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --border: #E2E0DA;
    --border-strong: #C8C5BD;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-muted: #A8A59E;
    --blue: #1A5FBF;
    --blue-light: #E8F0FB;
    --red: #C0392B;
    --amber: #B85C00;
    --green: #2D6A2D;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 40px 24px 80px; }
  .container { max-width: 860px; margin: 0 auto; }

  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .product-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--blue); background: var(--blue-light); padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 8px; }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .header-sub { font-size: 13px; color: var(--text-secondary); }
  .updated-at { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.6; white-space: nowrap; }

  .cards { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .card-value { font-family: var(--mono); font-size: 30px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text-muted); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th { font-size: 12px; font-weight: 500; color: var(--text-muted); text-align: right; padding: 10px 14px; border-bottom: 1px solid var(--border); letter-spacing: 0.04em; background: var(--bg); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); font-size: 15px; }
  td:first-child { text-align: left; font-family: var(--sans); font-weight: 500; font-size: 15px; }
  tr:last-child td { border-bottom: none; }
  .row-now td { background: #FAFAF8; }
  .total-row td { border-top: 2px solid var(--border-strong); font-weight: 500; background: var(--bg); }

  .badge-now { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 500; margin-left: 6px; background: var(--blue-light); color: var(--blue); font-family: var(--sans); vertical-align: middle; }
  .muted { color: var(--text-muted); font-family: var(--mono); }
  .pct-red { color: var(--red); }
  .pct-amber { color: var(--amber); }
  .pct-green { color: var(--green); }
  .bar-wrap { display: inline-block; width: 48px; height: 4px; background: var(--border); border-radius: 2px; vertical-align: middle; margin-left: 6px; overflow: hidden; }
  .bar { height: 4px; border-radius: 2px; display: inline-block; }

  .status { text-align: center; padding: 60px 0; font-size: 14px; color: var(--text-muted); font-family: var(--mono); }
  .status.error { color: var(--red); }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-btn { margin-top: 12px; font-size: 12px; font-family: var(--mono); color: var(--blue); cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; display: inline-block; }
  .refresh-btn:hover { background: var(--blue-light); }

  @media (max-width: 600px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; gap: 8px; }
    .updated-at { text-align: left; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="product-tag">115年韌性專案</div>
      <h1>企業進出口數據看板</h1>
      <div class="header-sub">訂閱達成率儀表板 · NT$999／年 · 年度目標 300 席</div>
    </div>
    <div class="updated-at" id="updated-at">載入中…</div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="table-wrap">
    <div class="status" id="status"><span class="spinner"></span>從 Google Sheets 讀取資料中…</div>
    <table id="main-table" style="display:none;">
      <thead>
        <tr>
          <th>月份</th>
          <th>月度目標</th>
          <th>月度實績</th>
          <th>月度達成率</th>
          <th>年度累計目標</th>
          <th>年度累計實績</th>
          <th>年度達成率</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>
<script>
// ══════════════════════════════════════════
//  設定區：每月只需更新 CURRENT_MONTH_LABEL
// ══════════════════════════════════════════
const SHEET_ID = '1kUFvr6J-WIgaSCyU0jt16-jmuXq3edWn1LAJoQ0zaUo';
const YEAR_TOTAL = 300;
const CURRENT_MONTH_LABEL = '4月'; // ← 每月改這裡：4月/5月/6月…
// ══════════════════════════════════════════

const API_URL = 'https://script.google.com/macros/s/AKfycbxkCGwoOsslEAq-8bXnxpKToga56iZ13Es3nvtjPxjqlf2G-KWSKAZfezSa9UMIvvgk/exec';

function colorInfo(pct) {
  if (pct === null) return { cls: 'muted', bar: '#C8C5BD' };
  if (pct < 50)    return { cls: 'pct-red',   bar: '#C0392B' };
  if (pct < 80)    return { cls: 'pct-amber', bar: '#B85C00' };
  return               { cls: 'pct-green',  bar: '#2D6A2D' };
}

function pctBar(pct, c) {
  if (pct === null) return '<span class="muted">—</span>';
  return `<span class="${c.cls}">${pct}%</span><span class="bar-wrap"><span class="bar" style="width:${Math.min(pct,100)}%;background:${c.bar};"></span></span>`;
}

async function fetchData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  return data.map(r => ({
    month:  r.month,
    target: Number(r.target),
    actual: r.actual !== null && r.actual !== '' ? Number(r.actual) : null,
  })).filter(r => r.month);
}

function render(data) {
  let cumTarget = 0, cumActual = 0;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const pad = n => String(n).padStart(2,'0');
  const now = new Date();
  const nowStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('updated-at').innerHTML = `資料讀取時間<br>${nowStr}`;

  data.forEach(row => {
    cumTarget += row.target;
    if (row.actual !== null) cumActual += row.actual;

    const monthPct = row.actual !== null ? Math.round(row.actual / row.target * 100) : null;
    const yearPct  = row.actual !== null ? Math.round(cumActual / cumTarget * 100) : null;
    const mc = colorInfo(monthPct), yc = colorInfo(yearPct);
    const isNow    = row.month === CURRENT_MONTH_LABEL;
    const isFuture = row.actual === null;

    const tr = document.createElement('tr');
    if (isNow) tr.className = 'row-now';

    tr.innerHTML = `
      <td>${row.month}${isNow ? '<span class="badge-now">本月</span>' : ''}</td>
      <td>${isFuture ? `<span class="muted">${row.target}</span>` : row.target}</td>
      <td>${row.actual !== null ? row.actual : '<span class="muted">—</span>'}</td>
      <td>${pctBar(monthPct, mc)}</td>
      <td>${isFuture ? `<span class="muted">${cumTarget}</span>` : cumTarget}</td>
      <td>${yearPct !== null ? cumActual : '<span class="muted">—</span>'}</td>
      <td>${pctBar(yearPct, yc)}</td>
    `;
    tbody.appendChild(tr);
  });

  const totalActual = data.filter(r => r.actual !== null).reduce((s, r) => s + r.actual, 0);
  const totalPct = Math.round(totalActual / YEAR_TOTAL * 100);
  const tc = colorInfo(totalPct);
  const totalTr = document.createElement('tr');
  totalTr.className = 'total-row';
  totalTr.innerHTML = `
    <td>年度合計</td>
    <td>${YEAR_TOTAL}</td>
    <td>${totalActual}</td>
    <td>${pctBar(totalPct, tc)}</td>
    <td>—</td><td>—</td><td>—</td>
  `;
  tbody.appendChild(totalTr);

  renderCards(data, totalActual, totalPct);
  document.getElementById('status').style.display = 'none';
  document.getElementById('main-table').style.display = 'table';
}

function renderCards(data, totalActual, totalPct) {
  const nowRow = data.find(r => r.month === CURRENT_MONTH_LABEL);
  const nowActual = nowRow?.actual ?? 0;
  const nowTarget = nowRow?.target ?? 1;
  const nowPct = Math.round(nowActual / nowTarget * 100);
  const remaining = YEAR_TOTAL - totalActual;

  document.getElementById('cards').innerHTML = [
    { label: '本月達成率', value: nowPct + '%',        sub: `${nowActual} / ${nowTarget} 人`, cls: colorInfo(nowPct).cls },
    { label: '年度進度',   value: totalPct + '%',       sub: `累計 ${totalActual} 人`,        cls: colorInfo(totalPct).cls },
    { label: '年度目標',   value: YEAR_TOTAL + ' 人',   sub: '2026 全年',                     cls: '' },
    { label: '尚需達成',   value: remaining + ' 人',    sub: '距年度目標',                    cls: remaining > 0 ? 'pct-amber' : 'pct-green' },
  ].map(c => `
    <div class="card">
      <div class="card-label">${c.label}</div>
      <div class="card-value ${c.cls}">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join('');
}

async function init() {
  document.getElementById('status').style.display = 'block';
  document.getElementById('status').className = 'status';
  document.getElementById('status').innerHTML = '<span class="spinner"></span>從 Google Sheets 讀取資料中…';
  document.getElementById('main-table').style.display = 'none';
  try {
    const data = await fetchData();
    render(data);
  } catch(e) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').innerHTML = `無法讀取資料，請確認 Google Sheets 已設為「知道連結的人可檢視」。<br><button class="refresh-btn" onclick="init()">重新載入</button>`;
  }
}

init();
setInterval(init, 5 * 60 * 1000); // 每5分鐘自動更新
</script>
</body>
</html>
